  "date-fns": "For formatting expense dates and approval timelines"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod schema validation in forms"
  "framer-motion": "For page transitions and interactive micro-animations"
  "clsx": "For conditional class name joining"
  "tailwind-merge": "For merging Tailwind CSS classes safely"

images:
